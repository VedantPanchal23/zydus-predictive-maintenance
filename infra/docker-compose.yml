# ============================================================
# Zydus Pharma Oncology — Predictive Maintenance System
# Docker Compose — All Services
# ============================================================

services:

  # ── PostgreSQL + TimescaleDB ──────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: zydus-postgres
    environment:
      POSTGRES_DB: zydus_db
      POSTGRES_USER: zydus_user
      POSTGRES_PASSWORD: zydus_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zydus_user -d zydus_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zydus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Zookeeper (Kafka dependency) ──────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zydus-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,stat,srvr"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | timeout 2 bash -c 'cat > /dev/tcp/localhost/2181 && cat' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Kafka ─────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: zydus-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ── MinIO (S3-compatible object storage) ──────────────────
  minio:
    image: minio/minio
    container_name: zydus-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: zydus-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_HTTP_PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── MLflow ────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: zydus-mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --allowed-hosts "*"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Airflow (ETL + ML orchestration UI) ───────────────────
  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: zydus-airflow
    command: >
      bash -c "
      airflow db migrate &&
      (
        airflow users create
        --username admin
        --password admin123
        --firstname Airflow
        --lastname Admin
        --role Admin
        --email admin@example.com ||
        true
      ) &&
      airflow scheduler &
      exec airflow webserver --port 8080
      "
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__FERNET_KEY: i1Dto6S-b5kY-TsnEFZZWJetPfavnKuDDvA7o9qWpMU=
      AIRFLOW__WEBSERVER__SECRET_KEY: zydus-airflow-secret
      PROJECT_ROOT: /opt/zydus
      PYTHONPATH: /opt/zydus
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8080:8080"
    volumes:
      - airflow_home:/opt/airflow
      - ./airflow/dags:/opt/airflow/dags
      - ..:/opt/zydus
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ── FastAPI Backend ───────────────────────────────────────
  fastapi-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: zydus-backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ../ml/artifacts:/app/ml_artifacts
    environment:
      DATABASE_URL: postgresql://zydus_user:zydus_pass@postgres:5432/zydus_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
      ML_ARTIFACTS_DIR: /app/ml_artifacts
      JWT_SECRET: zydus_secret_key_change_in_production
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Sensor Simulator ────────────────────────────────────
  simulator:
    build:
      context: ../simulator
      dockerfile: Dockerfile
    container_name: zydus-simulator
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os; os.kill(1, 0)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

  # ── Celery Worker (ML inference) ────────────────────────
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: zydus-celery-worker
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ../ml/artifacts:/app/ml_artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://zydus_user:zydus_pass@postgres:5432/zydus_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ML_ARTIFACTS_DIR: /app/ml_artifacts
    networks:
      - zydus-network
    restart: unless-stopped

  # ── Celery Beat (scheduler) ─────────────────────────────
  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: zydus-celery-beat
    command: celery -A celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
    networks:
      - zydus-network
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  minio_data:
  grafana_data:
  mlflow_data:
  airflow_home:

# ── Network ───────────────────────────────────────────────
networks:
  zydus-network:
    driver: bridge
    name: zydus-network
