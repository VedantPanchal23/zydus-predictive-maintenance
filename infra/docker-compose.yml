x-app-env: &app-env
  DATABASE_URL: postgresql://${APP_DB_USER:-zydus_user}:${APP_DB_PASSWORD:-zydus_pass}@postgres:5432/${APP_DB_NAME:-zydus_db}
  REDIS_URL: redis://redis:6379/0
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  MLFLOW_TRACKING_URI: http://mlflow:${MLFLOW_PORT:-5000}
  ML_ARTIFACTS_DIR: /app/ml_artifacts
  JWT_SECRET: ${JWT_SECRET:-change-this-before-production}
  PREDICTION_CACHE_TTL_SECONDS: ${PREDICTION_CACHE_TTL_SECONDS:-300}
  ML_DB_RETRIES: ${ML_DB_RETRIES:-3}
  ML_REDIS_RETRIES: ${ML_REDIS_RETRIES:-3}
  INGEST_DB_RETRIES: ${INGEST_DB_RETRIES:-3}
  ALERT_DB_RETRIES: ${ALERT_DB_RETRIES:-3}
  ALERT_REDIS_RETRIES: ${ALERT_REDIS_RETRIES:-3}
  CRITICAL_FAILURE_PROB_THRESHOLD: ${CRITICAL_FAILURE_PROB_THRESHOLD:-0.80}
  WARNING_FAILURE_PROB_THRESHOLD: ${WARNING_FAILURE_PROB_THRESHOLD:-0.40}
  CRITICAL_ANOMALY_THRESHOLD: ${CRITICAL_ANOMALY_THRESHOLD:-0.90}
  WARNING_ANOMALY_THRESHOLD: ${WARNING_ANOMALY_THRESHOLD:-0.70}
  CRITICAL_DAYS_TO_FAILURE_THRESHOLD: ${CRITICAL_DAYS_TO_FAILURE_THRESHOLD:-3}
  WARNING_DAYS_TO_FAILURE_THRESHOLD: ${WARNING_DAYS_TO_FAILURE_THRESHOLD:-14}
  CRITICAL_ALERT_COOLDOWN_HOURS: ${CRITICAL_ALERT_COOLDOWN_HOURS:-6}
  WARNING_ALERT_COOLDOWN_HOURS: ${WARNING_ALERT_COOLDOWN_HOURS:-2}
  PREDICTION_STALE_MINUTES: ${PREDICTION_STALE_MINUTES:-10}

x-airflow-env: &airflow-env
  AIRFLOW_HOME: /opt/airflow
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-b1J0YkF5VXhJcUpiU0tScVZDaDJrQzdENW5rQ0J5ejN2VFlJdHlnUm5MSQ==}
  AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS: "False"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow_pass}@airflow-postgres:5432/${AIRFLOW_DB_NAME:-airflow_db}
  AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
  AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "True"
  AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-change-airflow-web-secret}
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "False"
  AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
  RATELIMIT_STORAGE_URI: redis://redis:6379/1
  PROJECT_ROOT: /opt/zydus
  PYTHONPATH: /opt/zydus
  MLFLOW_TRACKING_URI: http://mlflow:${MLFLOW_PORT:-5000}

x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  image: zydus-airflow:local
  environment: *airflow-env
  volumes:
    - airflow_logs:/opt/airflow/logs
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/webserver_config.py:/opt/airflow/webserver_config.py
    - ..:/opt/zydus
  depends_on:
    airflow-postgres:
      condition: service_healthy
    mlflow:
      condition: service_healthy
  networks:
    - zydus-network

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: zydus-postgres
    environment:
      POSTGRES_DB: ${APP_DB_NAME:-zydus_db}
      POSTGRES_USER: ${APP_DB_USER:-zydus_user}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-zydus_pass}
    ports:
      - "${APP_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-zydus_user} -d ${APP_DB_NAME:-zydus_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  airflow-postgres:
    image: postgres:15-alpine
    container_name: zydus-airflow-postgres
    environment:
      POSTGRES_DB: ${AIRFLOW_DB_NAME:-airflow_db}
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow_pass}
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER:-airflow} -d ${AIRFLOW_DB_NAME:-airflow_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: zydus-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zydus-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,stat,srvr"
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | timeout 2 bash -c 'cat > /dev/tcp/localhost/2181 && cat' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: zydus-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 90s
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: zydus-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: zydus-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_HTTP_PORT: 3001
    ports:
      - "${GRAFANA_PORT:-3001}:3001"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: zydus-mlflow
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "${MLFLOW_PORT:-5000}"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --artifacts-destination
      - /mlflow/artifacts
      - --serve-artifacts
      - --allowed-hosts
      - "${MLFLOW_ALLOWED_HOSTS:-*}"
    ports:
      - "${MLFLOW_PORT:-5000}:${MLFLOW_PORT:-5000}"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${MLFLOW_PORT:-5000}/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: zydus-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - >
        airflow db migrate &&
        airflow users create
        --username "${AIRFLOW_ADMIN_USERNAME:-admin}"
        --password "${AIRFLOW_ADMIN_PASSWORD:-admin123}"
        --firstname "Airflow"
        --lastname "Admin"
        --role "Admin"
        --email "${AIRFLOW_ADMIN_EMAIL:-admin@example.com}" || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: zydus-airflow
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: zydus-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  fastapi-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: zydus-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    volumes:
      - ../ml/artifacts:/app/ml_artifacts
    command: >
      sh -c "python common/wait_for_dependencies.py --postgres --redis --kafka --mlflow --timeout 240 &&
      uvicorn main:app --host 0.0.0.0 --port 8000"
    environment:
      <<: *app-env
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  simulator:
    build:
      context: ../simulator
      dockerfile: Dockerfile
    container_name: zydus-simulator
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
    networks:
      - zydus-network
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os; os.kill(1, 0)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: zydus-celery-worker
    command: >
      sh -c "python common/wait_for_dependencies.py --postgres --redis --kafka --mlflow --timeout 240 &&
      celery -A celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-2}"
    volumes:
      - ../ml/artifacts:/app/ml_artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      <<: *app-env
    networks:
      - zydus-network
    restart: unless-stopped

  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: zydus-celery-beat
    command: >
      sh -c "python common/wait_for_dependencies.py --redis --timeout 120 &&
      celery -A celery_app beat --loglevel=info"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
    networks:
      - zydus-network
    restart: unless-stopped

volumes:
  postgres_data:
  airflow_postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  minio_data:
  grafana_data:
  mlflow_data:
  airflow_logs:

networks:
  zydus-network:
    driver: bridge
    name: zydus-network
